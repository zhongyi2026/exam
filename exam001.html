<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年班·经络腧穴自测 (20题)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f0f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .exam-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,20,30,0.15);
            padding: 30px 35px;
            border: 1px solid #cfdee9;
        }
        h1 {
            font-size: 2.1rem;
            color: #0b3b4b;
            margin: 0 0 5px 0;
            font-weight: 500;
            border-left: 8px solid #3498ad;
            padding-left: 20px;
        }
        .subhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 25px 0;
            color: #2c5f73;
            font-weight: 400;
            flex-wrap: wrap;
        }
        .class-info {
            background: #e4f0f5;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .score-indicator {
            background: #d9eaf0;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1.1rem;
            color: #0a4455;
        }
        .student-row {
            background: #fafdff;
            border: 1px solid #bdd7e2;
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .student-row label {
            font-size: 1.2rem;
            font-weight: 500;
            color: #135e73;
        }
        .student-row input {
            border: none;
            background: #ffffff;
            border: 2px solid #b0cfdd;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 1.1rem;
            width: 200px;
            outline: none;
            transition: 0.2s;
        }
        .student-row input:focus {
            border-color: #1d7e9c;
            box-shadow: 0 0 0 3px rgba(28,126,156,0.2);
        }
        .quiz-form {
            margin: 25px 0 15px;
        }
        .question-card {
            background: #ffffff;
            border: 1px solid #cde3ec;
            border-radius: 30px;
            padding: 18px 25px;
            margin-bottom: 14px;
            transition: 0.1s;
            box-shadow: 0 3px 8px rgba(0,30,40,0.03);
        }
        .question-card.correct-highlight {
            border-left: 10px solid #2a9d8f;
            background: #f5fdfb;
        }
        .question-card.wrong-highlight {
            border-left: 10px solid #e76f51;
            background: #fff8f5;
        }
        .q-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1c5e73;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .q-num {
            background: #2d7e96;
            color: white;
            border-radius: 50px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            margin-right: 10px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 35px;
            margin-left: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
        }
        .option-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2f8eaa;
        }
        hr {
            border: 1px dashed #b7d3e0;
            margin: 10px 0;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 35px 0 20px;
        }
        .btn {
            border: none;
            background: #c4dde8;
            padding: 14px 38px;
            border-radius: 70px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #0d3949;
            cursor: pointer;
            transition: 0.15s;
            border: 2px solid transparent;
            box-shadow: 0 4px 8px rgba(0,30,40,0.1);
        }
        .btn-primary {
            background: #217a94;
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 14px rgba(0,90,120,0.25);
        }
        .btn-primary:hover {
            background: #1b657c;
            transform: scale(1.01);
        }
        .btn-secondary:hover {
            background: #b1cfdd;
            border-color: #5d99b0;
        }
        .result-panel {
            background: #ddeef6;
            border-radius: 50px;
            padding: 25px 30px;
            margin: 30px 0 10px;
            font-size: 1.2rem;
            border: 1px solid #aac7d8;
        }
        .score-big {
            font-size: 2.8rem;
            font-weight: 700;
            color: #115e7a;
            line-height: 1.2;
        }
        .remark {
            font-size: 1.4rem;
            margin-left: 15px;
            color: #1f5063;
        }
        .mistake-list {
            margin-top: 20px;
            background: #fcf2eb;
            border-radius: 30px;
            padding: 20px;
            border-left: 6px solid #e76f51;
        }
        .mistake-title {
            font-weight: 600;
            color: #a23b1f;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .mistake-item {
            padding: 6px 0;
            border-bottom: 1px dashed #e7b59e;
        }
        .footer {
            text-align: right;
            color: #6d96a8;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        .disabled-radio {
            opacity: 0.9;
        }
        .warning-message {
            color: #b34a2e;
            font-weight: 500;
            padding-left: 20px;
        }
    </style>
</head>
<body>
<div class="exam-container">
    <h1>🧧 经络腧穴·开心自测</h1>
    <div class="subhead">
        <span class="class-info">👵 老年班 · 全班50人   |   班长期末特供</span>
        <span class="score-indicator">💯 满分100分 · 每题5分</span>
    </div>

    <!-- 学号输入 -->
    <div class="student-row">
        <label for="studentId">🔢 学号 (1~50):</label>
        <input type="number" id="studentId" min="1" max="50" placeholder="例如 23" value="18">
        <span style="color:#487582; margin-left:auto;">请填写真实学号</span>
    </div>

    <div class="quiz-form" id="quizForm">
        <!-- 题目将通过JavaScript动态生成，保留原题顺序及答案 -->
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" id="submitBtn">📥 提交 · 看分数</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 重新答题</button>
    </div>

    <!-- 结果显示区域 -->
    <div class="result-panel" id="resultPanel" style="display: none;">
        <div style="display: flex; align-items: baseline; flex-wrap: wrap;">
            <span class="score-big" id="scoreValue">0</span><span style="font-size:1.8rem;">分</span>
            <span class="remark" id="remarkText">优秀</span>
        </div>
        <div id="mistakeContainer" class="mistake-list" style="display: none;">
            <div class="mistake-title">📌 错题号 (点击可对照)</div>
            <div id="mistakeDetails"></div>
        </div>
        <div style="margin-top: 12px; color: #2d677d;" id="scoreMessage"></div>
    </div>

    <div class="footer">
        出题依据：《经络腧穴概述自测卷1》· 标准答案
    </div>
</div>

<script>
    (function() {
        // ---------- 题库数据 (严格按照文件: 20题，每题5分，标准答案) ----------
        const questions = [
            { text: "经络的核心作用是？", options: ["A. 储存气血", "B. 运行气血", "C. 生成气血", "D. 分解气血"], correct: "B" },
            { text: "腧穴不具备以下哪种功用？", options: ["A. 诊断疾病", "B. 治疗疾病", "C. 气血输注点", "D. 生成脏腑之气"], correct: "D" },
            { text: "十二经脉命名不结合哪个方面？", options: ["A. 脏腑系统", "B. 阴阳属性", "C. 手足部位", "D. 身高体型"], correct: "D" },
            { text: "手之三阴从胸走手，循行方向是？", options: ["A. 从手到胸", "B. 从胸到手", "C. 从头到手", "D. 从足到胸"], correct: "B" },
            { text: "足之三阳经的循行规律是？", options: ["A. 从头走足", "B. 从足走头", "C. 从胸走足", "D. 从手走足"], correct: "A" },
            { text: "十二经脉循行特点是？", options: ["A. 单向循行", "B. 首尾相贯如环无端", "C. 仅体表循行", "D. 仅脏腑内循行"], correct: "B" },
            { text: "以下哪项不属于取穴基本方法？", options: ["A. 骨度分寸法", "B. 特定标志法", "C. 体重比例法", "D. 手指同身寸"], correct: "C" },
            { text: "骨度分寸法适用范围是？", options: ["A. 仅成年人", "B. 仅儿童", "C. 任何年龄体型", "D. 仅标准体型"], correct: "C" },
            { text: "属于固定标志法取穴的是？", options: ["A. 屈肘取曲池", "B. 张口取听宫", "C. 两乳之间取膻中", "D. 抬手取肩井"], correct: "C" },
            { text: "属于活动姿势标志法的是？", options: ["A. 肚脐取神阙", "B. 第 7 颈椎取大椎", "C. 屈肘横纹取曲池", "D. 乳头取乳根"], correct: "C" },
            { text: "中指同身寸 1 寸是指？", options: ["A. 中指中节屈曲内侧纹头间距", "B. 拇指关节横度", "C. 四指并拢", "D. 食指中节长度"], correct: "A" },
            { text: "拇指同身寸 1 寸适用于？", options: ["A. 背部横量", "B. 四肢直寸取穴", "C. 胸部横量", "D. 头部直量"], correct: "B" },
            { text: "'一夫法' 指的是？", options: ["A. 中指同身寸", "B. 拇指同身寸", "C. 横指同身寸", "D. 骨度分寸"], correct: "C" },
            { text: "前发际至后发际骨度分寸是？", options: ["A.8 寸", "B.12 寸", "C.18 寸", "D.9 寸"], correct: "B" },
            { text: "两乳头之间横量骨度分寸是？", options: ["A.5 寸", "B.8 寸", "C.12 寸", "D.9 寸"], correct: "B" },
            { text: "胸剑联合至脐中直量是？", options: ["A.5 寸", "B.8 寸", "C.13 寸", "D.18 寸"], correct: "B" },
            { text: "腋前纹头至肘横纹骨度分寸是？", options: ["A.9 寸", "B.12 寸", "C.18 寸", "D.16 寸"], correct: "A" },
            { text: "胫骨内侧髁下缘至内踝尖长度是？", options: ["A.13 寸", "B.16 寸", "C.19 寸", "D.8 寸"], correct: "A" },
            { text: "股骨大转子至膝中适用于？", options: ["A. 手三阴", "B. 足三阳", "C. 手三阳", "D. 足三阴"], correct: "B" },
            { text: "背部横寸骨度标准是？", options: ["A. 两肩胛内缘 6 寸", "B. 两乳头 8 寸", "C. 肘至腕 12 寸", "D. 脐至耻骨 5 寸"], correct: "A" }
        ];

        // 标准答案字母数组（用于快速比较）
        const correctAnswers = questions.map(q => q.correct);

        // 存储每个题用户选择的radio值 (A/B/C/D)
        let userSelections = new Array(questions.length).fill(null);

        // 当前是否已经提交过 (用于显示错题高亮)
        let submitted = false;

        // 获取DOM容器
        const quizForm = document.getElementById('quizForm');
        const resultPanel = document.getElementById('resultPanel');
        const scoreValue = document.getElementById('scoreValue');
        const remarkText = document.getElementById('remarkText');
        const mistakeContainer = document.getElementById('mistakeContainer');
        const mistakeDetails = document.getElementById('mistakeDetails');
        const scoreMessage = document.getElementById('scoreMessage');
        const studentIdInput = document.getElementById('studentId');

        // 渲染题目
        function renderQuestions() {
            let htmlStr = '';
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const qIndex = i + 1;
                // 构建每个选项的radio name 统一为 'q'+i
                const nameAttr = `q${i}`;
                // 检查之前是否有选择
                const savedChoice = userSelections[i];
                htmlStr += `<div class="question-card" id="qCard${i}" data-index="${i}">`;
                htmlStr += `<div class="q-title"><span class="q-num">${qIndex}</span> ${q.text}</div>`;
                htmlStr += `<div class="options">`;

                q.options.forEach(opt => {
                    const optLetter = opt.charAt(0); // A, B, C, D
                    const checked = (savedChoice === optLetter) ? 'checked' : '';
                    htmlStr += `<label class="option-item"><input type="radio" name="${nameAttr}" value="${optLetter}" ${checked} > ${opt}</label>`;
                });

                htmlStr += `</div>`;
                // 如果已经提交，并且在错题列表里，可以用css高亮，但是我们在提交时统一处理
                htmlStr += `</div>`;
            }
            quizForm.innerHTML = htmlStr;

            // 添加监听事件: 任何radio变化时更新 userSelections 并清除提交状态 (但保留高亮可后续)
            for (let i = 0; i < questions.length; i++) {
                const radios = document.getElementsByName(`q${i}`);
                radios.forEach(radio => {
                    radio.addEventListener('change', function(e) {
                        userSelections[i] = e.target.value;
                        // 如果已经提交，修改后自动去掉高亮？但为了交互更友好，我们不清除提交标志，但高亮可以保留? 用户重新选后，我们希望重新提交前看不到错题背景。最简单：重置submitted状态？
                        // 但为了清楚，只要用户改动任何一个选项，我们就隐藏结果面板并清除高亮。 (类似于开始修改)
                        if (submitted) {
                            // 取消提交状态，隐藏结果，移除高亮类
                            submitted = false;
                            resultPanel.style.display = 'none';
                            removeHighlightClasses();
                        }
                    });
                });
            }
        }

        // 移除所有高亮class
        function removeHighlightClasses() {
            for (let i = 0; i < questions.length; i++) {
                const card = document.getElementById(`qCard${i}`);
                if (card) {
                    card.classList.remove('correct-highlight', 'wrong-highlight');
                }
            }
        }

        // 根据提交结果高亮卡片 (正确/错误)
        function applyHighlightClasses() {
            for (let i = 0; i < questions.length; i++) {
                const card = document.getElementById(`qCard${i}`);
                if (!card) continue;
                const selected = userSelections[i];
                const correct = correctAnswers[i];
                // 移除以前的高亮
                card.classList.remove('correct-highlight', 'wrong-highlight');
                if (selected) {
                    if (selected === correct) {
                        card.classList.add('correct-highlight');
                    } else {
                        card.classList.add('wrong-highlight');
                    }
                } else {
                    // 未选也可以给个提示？为了友好，未选我们不加高亮，但算错题。
                    // 也可以加灰色边框，暂不处理
                }
            }
        }

        // 计算分数和错题
        function computeScore() {
            let correctCount = 0;
            const mistakes = [];
            for (let i = 0; i < questions.length; i++) {
                const selected = userSelections[i];
                const correct = correctAnswers[i];
                if (selected && selected === correct) {
                    correctCount++;
                } else {
                    mistakes.push(i + 1); // 存储题号(1-index)
                }
            }
            return { correctCount, mistakes };
        }

        // 显示结果面板
        function showResult() {
            const { correctCount, mistakes } = computeScore();
            const totalScore = correctCount * 5;

            // 学号简单验证 (可随意，但保留)
            let studentId = studentIdInput.value.trim();
            if (studentId === '' || parseInt(studentId) < 1 || parseInt(studentId) > 50) {
                studentId = '??';
            }

            // 显示分数
            scoreValue.innerText = totalScore;
            // 评语
            let remark = '';
            if (totalScore >= 90) remark = '优秀 🌟';
            else if (totalScore >= 80) remark = '良好 👍';
            else if (totalScore >= 60) remark = '及格 📚';
            else remark = '需复习 🕒';
            remarkText.innerText = remark;

            // 构建错题区域
            if (mistakes.length > 0) {
                mistakeContainer.style.display = 'block';
                let mistakeHtml = '';
                mistakes.forEach(qNo => {
                    mistakeHtml += `<div class="mistake-item">❌ 第 ${qNo} 题</div>`;
                });
                mistakeDetails.innerHTML = mistakeHtml;
            } else {
                mistakeContainer.style.display = 'none';
            }

            // 显示总分消息
            scoreMessage.innerText = `学号 ${studentId}  答对 ${correctCount} 题，共 ${totalScore} 分。${mistakes.length ? '错题已标出' : '太棒了，全对！'}`;

            // 高亮卡片
            applyHighlightClasses();

            resultPanel.style.display = 'block';
            submitted = true;
        }

        // 重置所有选项和结果
        function resetExam() {
            // 重置userSelections
            userSelections = new Array(questions.length).fill(null);
            // 重置所有radio
            for (let i = 0; i < questions.length; i++) {
                const radios = document.getElementsByName(`q${i}`);
                if (radios) {
                    radios.forEach(r => r.checked = false);
                }
            }
            // 隐藏结果面板
            resultPanel.style.display = 'none';
            submitted = false;
            removeHighlightClasses();
            // 学号可保留不动
        }

        // 初始化渲染
        renderQuestions();

        // 提交按钮
        document.getElementById('submitBtn').addEventListener('click', function() {
            // 简单的学号提醒（非强制）
            let sid = studentIdInput.value;
            if (!sid || parseInt(sid) < 1 || parseInt(sid) > 50) {
                alert('请填写正确的学号 (1-50) 以便登记成绩。');
            }
            // 检查是否所有题目都选了？友好提醒但不强制
            const missing = [];
            for (let i = 0; i < questions.length; i++) {
                if (!userSelections[i]) missing.push(i+1);
            }
            if (missing.length > 0) {
                if (!confirm(`第 ${missing.join(', ')} 题尚未选择，确定提交吗？（未选视为错误）`)) {
                    return;
                }
            }
            showResult();
        });

        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', function() {
            resetExam();
        });

        // 初始隐藏结果
        resultPanel.style.display = 'none';
    })();
</script>
</body>
</html>
